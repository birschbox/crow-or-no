<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crow or No?</title>
  
    <!-- Google Font: Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  
    <link rel="stylesheet" href="style.css" />
  </head>
  
<body>

  <div class="container">
    <h1>🐦‍⬛ Crow or No?</h1>
    <p class="subtitle">Are you smarter than a bird?</p>

    <div id="game">
      <div id="question" class="question"></div>
        <img id="questionImage" class="media hidden" />
        <div id="zoomContainer" class="zoom-container hidden">
          <img id="zoomImage" class="zoom-image" alt="" />
        </div>
        <audio id="questionAudio" class="hidden" controls></audio>
        <div id="ytContainer" class="yt-container hidden">
          <iframe id="ytPlayer" class="yt-iframe" frameborder="0"
                  allow="autoplay; encrypted-media" allowfullscreen></iframe>
          <div id="ytCover" class="yt-cover">
            <p class="yt-cover-label">🎵 Listen and decide...</p>
            <button id="ytPlayBtn" class="btn yt-play-btn">▶ Play</button>
          </div>
        </div>
      <div id="feedback" class="feedback"></div>
        <p id="explanation" class="explanation"></p>
        <img id="revealImage" class="media hidden" alt="Reveal" />
        <div id="revealYtContainer" class="yt-container hidden">
          <iframe id="revealYtPlayer" class="yt-iframe" frameborder="0"
                  allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <p id="revealCaption" class="reveal-caption hidden"></p>

      <div class="buttons">
        <div class="btn-wrap">
          <span class="your-answer-label hidden">Your Answer</span>
          <button onclick="submitAnswer('crow')" class="btn crow">Crow</button>
        </div>
        <div class="btn-wrap">
          <span class="your-answer-label hidden">Your Answer</span>
          <button onclick="submitAnswer('no')" class="btn no">No</button>
        </div>
      </div>

      <button id="nextBtn" class="btn next hidden"></button>
      <div id="progress" class="progress"></div>
    </div>

    <div id="results" class="hidden">
      <h2 id="scoreText"></h2>
      <p id="timeDisplay" class="time-display hidden"></p>
      <p id="revealCta" class="reveal-cta hidden"></p>

      <button id="saveScoreTrigger" class="save-trigger">Save Score</button>
      <p id="scoreSavedMsg" class="score-saved-msg"></p>

      <button id="leaderboardToggle" class="btn lb-toggle">🏆 High Scores</button>
      <div id="leaderboardPanel" class="leaderboard-panel hidden">
        <div id="leaderboardList" class="leaderboard-list"></div>
      </div>

      <button onclick="restartGame()" class="btn restart">Play Again</button>
    </div>

    <div id="ended" class="hidden">
      <p class="subtitle">🐦‍⬛ This game has ended.</p>
      <p class="progress">Thanks for playing Crow or No?</p>
    </div>
  </div>

  <!-- Celebration Modal -->
  <div id="celebrationModal" class="modal-overlay hidden">
    <div class="modal-box">
      <p id="modalMessage" class="modal-message"></p>
      <div class="modal-stats">
        <span id="modalScore"></span>
        <span id="modalTime"></span>
      </div>
      <div class="modal-initials-row">
        <label class="modal-initials-label">Your Initials</label>
        <input id="initialsInput" class="modal-initials-input" type="text" maxlength="3"
               placeholder="ABC" autocomplete="off" spellcheck="false" />
      </div>
      <button id="modalCloseBtn" class="btn">🐦‍⬛ Save Score</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
